server:
  port: 8080

spring:
  application:
    name: ehub-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/users/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: http://user-service:8080
          predicates:
            - Path=/users/**
        - id: websocket
          uri: http://user-service:8080
          predicates:
            - Path=/ws/**
        - id: keycloak
          uri: http://keycloak:8080
          predicates:
            - Path=/realms/**, /resources/**, /robots.txt
        - id: keycloak-auth
          uri: http://keycloak:8080
          predicates:
            - Path=/auth/**
